name: CI/CD Docker App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # build
      - name: Build Docker Image
        run: docker build -t my-app-wrong .

      # run/test
      - name: Run Container (test)
        run: |
          docker run -d -p 9000:9000 my-app
          sleep 5
      
      - name: Check if app is running
        run: curl http://localhost:9000       
